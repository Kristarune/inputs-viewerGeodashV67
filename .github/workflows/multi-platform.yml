## Key Changes:
- `IVSettingEvent` now inherits from `geode::GlobalEvent` with the correct template parameters
- Removed custom `IVSettingFilter` class; use `geode::EventFilter<IVSettingEvent>` directly
- Made the filter type alias explicit in the macro to avoid template resolution issues
- Added the missing include for `IVEvent.hpp` in the manager header
