I'll help you find a solution for this failing job. Let me start by retrieving the job logs.Now let me examine the relevant source files to understand the issue:## Problem Analysis

The build is failing due to incompatibilities between your custom event system (`IVSettingEvent`) and the Geode SDK's event system. The compiler errors reveal:

1. **`IVSettingEvent` lacks a `post()` method** — Custom events in Geode need to inherit from `geode::GlobalEvent` to have this functionality
2. **Missing `EventFilter` and `EventListener` templates** — These aren't available in the `geode` namespace for your custom event
3. **`SettingChangedFilterV3` API mismatch** — The macro is trying to use it directly, but it's not being recognized

## Solution

Replace your custom event system with Geode's built-in `GlobalEvent`. Here's the fix:

### Update `src/IVEvent.hpp`:

```c++
#pragma once

GEODE_NS_IV_BEGIN

enum class SettingEventType {
    Color,
    KeyAppearance,
    RefreshView,
};

class IVSettingEvent : public geode::GlobalEvent<IVSettingEvent, SettingEventType> {
public:
    IVSettingEvent(SettingEventType type) : m_type(type) {}
    SettingEventType getType() const noexcept { return m_type; }
    
protected:
    SettingEventType m_type;
};

using IVSettingFilter = geode::EventFilter<IVSettingEvent>;

GEODE_NS_IV_END
```

